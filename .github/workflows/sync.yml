name: IPTV Link Sync Machine

on:
  schedule:
    - cron: '0 */3 * * *' # Automatically runs every 3 hours
  workflow_dispatch:      # MAGIC BUTTON: Allows you to run it manually anytime!

permissions:
  contents: write         # Grants GitHub Actions permission to save files to your repo

jobs:
  sync-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Network Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Execute Link Sync Script
        run: python sync.py

      - name: Commit and Push Generated Playlists
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage both potential files safely
          git add channels.json playlist.m3u || true
          
          # Only commit if changes actually exist to avoid unnecessary workflow failures
          if git diff --staged --quiet; then
            echo "No changes detected in links. Skipping commit."
          else
            git commit -m "🤖 Auto-Sync: Updated and verified live TV links"
            git push origin main
          fi
